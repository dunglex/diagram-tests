<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1552" height="260" viewBox="0 0 1552 260">
<defs>
  <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L9,4.5 L0,9 L2.5,4.5 Z" fill="#475569"/>
  </marker>
  <marker id="arrowhead-open" markerWidth="14" markerHeight="11" refX="12" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L11,5.5 L0,11" fill="none" stroke="#475569" stroke-width="1.4"/>
  </marker>
  <marker id="dot" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
    <circle cx="4.5" cy="4.5" r="3" fill="#ffffff" stroke="#475569" stroke-width="1.2"/>
  </marker>
  <linearGradient id="grad-task" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#eff6ff"/>
  </linearGradient>
  <linearGradient id="grad-subprocess" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#f5f3ff"/>
  </linearGradient>
  <linearGradient id="grad-start" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#dcfce7"/>
  </linearGradient>
  <linearGradient id="grad-end" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#fee2e2"/>
  </linearGradient>
  <linearGradient id="grad-intermediate" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#fef3c7"/>
  </linearGradient>
  <linearGradient id="grad-gateway" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#fefce8"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="1.5" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.18"/>
  </filter>
</defs>
<style>
  .bpmn-task { fill: url(#grad-task); stroke: #2563eb; stroke-width: 2; filter: url(#shadow); }
  .bpmn-subprocess { fill: url(#grad-subprocess); stroke: #7c3aed; stroke-width: 2; filter: url(#shadow); }
  .bpmn-event-start { fill: url(#grad-start); stroke: #16a34a; stroke-width: 2; filter: url(#shadow); }
  .bpmn-event-intermediate { fill: url(#grad-intermediate); stroke: #d97706; stroke-width: 2; }
  .bpmn-event-end { fill: url(#grad-end); stroke: #dc2626; stroke-width: 3.5; filter: url(#shadow); }
  .bpmn-gateway { fill: url(#grad-gateway); stroke: #ca8a04; stroke-width: 2; filter: url(#shadow); }
  .bpmn-gateway-marker { stroke: #a16207; fill: none; }
  .bpmn-flow { fill: none; stroke: #475569; stroke-width: 1.6; marker-end: url(#arrowhead); stroke-linejoin: round; stroke-linecap: round; }
  .bpmn-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #1e293b; text-anchor: middle; dominant-baseline: central; }
  .bpmn-flow-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #475569; text-anchor: middle; dominant-baseline: central; }
  .bpmn-pool { fill: #ffffff; stroke: #475569; stroke-width: 2; }
  .bpmn-pool-header { fill: #f1f5f9; stroke: #475569; stroke-width: 2; }
  .bpmn-lane { fill: none; stroke: #94a3b8; stroke-width: 1; }
  .bpmn-lane-header { fill: #f1f5f9; stroke: #475569; stroke-width: 1; }
  .bpmn-annotation { fill: none; stroke: #94a3b8; stroke-width: 1; }
  .bpmn-annotation-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #1e293b; }
  .bpmn-icon { stroke: #334155; fill: none; }
  .bpmn-data-object { fill: #ffffff; stroke: #1e293b; stroke-width: 1.4; }
  .bpmn-data-object-fold { fill: #f3f4f6; stroke: #1e293b; stroke-width: 1.4; }
  .bpmn-data-store { fill: #ffffff; stroke: #1e293b; stroke-width: 1.4; }
  .bpmn-data-store-ridge { fill: none; stroke: #1e293b; stroke-width: 1; }
  .bpmn-group { fill: none; stroke: #475569; stroke-width: 1.5; stroke-dasharray: 10,4,2,4; }
  .bpmn-message-flow { fill: none; stroke: #1e293b; stroke-width: 1.4; stroke-dasharray: 6,4; marker-end: url(#arrowhead-open); marker-start: url(#dot); stroke-linejoin: round; stroke-linecap: round; }
  .bpmn-association-flow { fill: none; stroke: #1e293b; stroke-width: 1; stroke-dasharray: 2,3; }
  .bpmn-data-association-flow { fill: none; stroke: #1e293b; stroke-width: 1.2; stroke-dasharray: 4,3; marker-end: url(#arrowhead-open); stroke-linejoin: round; stroke-linecap: round; }
</style>
